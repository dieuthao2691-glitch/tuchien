<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Thanh toán - Túc Hiên</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:24px;background:#f6f1eb;color:#2f241f}
    .card{max-width:720px;margin:32px auto;background:#fff;padding:20px;border-radius:12px;border:1px solid #e4d9ce}
    .qr{display:flex;gap:16px;align-items:center}
    img.qr-img{width:220px;height:220px;object-fit:contain;border-radius:8px;border:1px solid #eee}
    .info{flex:1}
    .btn{padding:10px 12px;border-radius:8px;background:#9e6f55;color:#fff;border:none;cursor:pointer}
    .muted{color:#75695f}
    .hidden{display:none}
    .status-box{margin-top:20px;padding:18px;border-radius:14px;border:1px solid transparent;box-shadow:0 14px 30px rgba(0,0,0,.08);background:#fff}
    .status-box.success{border-color:#9ecf97;background:#eaf7eb;color:#214d28}
    .status-box.error{border-color:#e1a2a2;background:#fde8e8;color:#7b2525}
    .status-box h3{margin-top:0;margin-bottom:8px;font-size:1.2rem}
    .status-box p{margin:0; line-height:1.6}
  </style>
</head>
<body>
  <div class="card">
    <h2 id="title">Thanh toán</h2>
    <div id="summary" class="muted">Chuẩn bị giao dịch...</div>
    <form id="customerForm" onsubmit="return handleCustomerSubmit(event)">
      <div style="margin: 16px 0; padding: 18px; border: 1px solid #e4d9ce; border-radius: 14px; background: #faf6f0;">
        <div style="font-weight:700;margin-bottom:12px;color:#3b2d25;">Thông tin khách hàng</div>
        <div style="margin-bottom:12px;">
          <label for="customer-name">Tên khách hàng *</label><br>
          <input id="customer-name" type="text" placeholder="Nhập tên của bạn" style="width:100%;padding:10px;border:1px solid #d8c9bd;border-radius:10px;" required>
        </div>
        <div style="margin-bottom:12px;">
          <label for="customer-phone">Số điện thoại *</label><br>
          <input id="customer-phone" type="tel" placeholder="Nhập số điện thoại" style="width:100%;padding:10px;border:1px solid #d8c9bd;border-radius:10px;" required>
        </div>
        <div style="margin-bottom:12px;">
          <label for="customer-email">Email *</label><br>
          <input id="customer-email" type="email" placeholder="Nhập email của bạn" style="width:100%;padding:10px;border:1px solid #d8c9bd;border-radius:10px;" required>
        </div>
        <div style="margin-bottom:16px;">
          <label for="captcha-input">Mã xác thực *</label><br>
          <div style="display:flex;align-items:center;gap:10px;margin:8px 0;">
            <div id="captcha-code" style="padding:10px 14px;background:#fff;border:1px solid #d8c9bd;border-radius:10px;font-weight:700;letter-spacing:.12em;">0000</div>
            <button type="button" id="refreshCaptcha" class="btn" style="background:#7d6b5f;padding:10px 14px;">Đổi mã</button>
          </div>
          <input id="captcha-input" type="text" placeholder="Nhập mã xác thực" style="width:100%;padding:10px;border:1px solid #d8c9bd;border-radius:10px;" required>
        </div>
        <button type="submit" class="btn" style="width:100%;background:#5a8a6a;">Xác nhận thông tin</button>
      </div>
    </form>
    <div class="qr">
      <img id="qrImage" class="qr-img" src="qr-vietqr-sepay.png" alt="QR thanh toán" />
      <div class="info">
        <div><strong>Gói/Dịch vụ:</strong> <span id="serviceName"></span></div>
        <div><strong>Số tiền cần thanh toán:</strong> <span id="amount"></span></div>
        <div><strong>Ngân hàng:</strong> <span id="bankName">BIDV</span></div>
        <div>
          <strong>Số tài khoản:</strong>
          <span id="accountNumber">96247TUCHIEN</span>
          <button id="btnCopyAccount" class="btn" style="margin-left:8px;padding:6px 10px;background:#7d6b5f;">📋</button>
        </div>
        <div>
          <strong>Chủ tài khoản:</strong>
          <span id="accountHolder">NGUYEN NGOC DIEU THAO</span>
          <button id="btnCopyHolder" class="btn" style="margin-left:8px;padding:6px 10px;background:#7d6b5f;">📋</button>
        </div>
        <div><strong>Nội dung thanh toán:</strong></div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:8px 0;">
          <span id="paymentNote" style="word-break:break-all;max-width:100%;background:#f7f1e9;padding:10px;border-radius:10px;display:inline-block;"></span>
          <button id="btnCopyNote" class="btn" style="background:#7d6b5f;padding:6px 10px;">Sao chép nội dung</button>
        </div>
        <div style="height:10px"></div>
        <div id="actions">
          <button id="btnOpenQr" class="btn" style="margin-right:8px;background:#5a8a6a">Mở QR</button>
          <button id="btnPaid" class="btn">Tôi đã chuyển tiền</button>
        </div>
      </div>
    </div>
    <div id="resultBox" class="status-box hidden">
      <h3 id="resultTitle"></h3>
      <p id="resultText"></p>
      <button id="resultClose" class="btn">Đóng</button>
    </div>
  </div>
  <script>
    function qs(key){
      return new URLSearchParams(window.location.search).get(key);
    }
    let orderId = qs('order_id');
    const amountEl = document.getElementById('amount');
    const paymentNoteEl = document.getElementById('paymentNote');
    const summary = document.getElementById('summary');
    const btnPaid = document.getElementById('btnPaid');
    const btnOpenQr = document.getElementById('btnOpenQr');
    const btnCopyNote = document.getElementById('btnCopyNote');
    const btnCopyAccount = document.getElementById('btnCopyAccount');
    const btnCopyHolder = document.getElementById('btnCopyHolder');
    const customerForm = document.getElementById('customerForm');
    const customerNameInput = document.getElementById('customer-name');
    const customerPhoneInput = document.getElementById('customer-phone');
    const customerEmailInput = document.getElementById('customer-email');
    const captchaCodeEl = document.getElementById('captcha-code');
    const captchaInput = document.getElementById('captcha-input');
    const refreshCaptcha = document.getElementById('refreshCaptcha');

    const resultBox = document.getElementById('resultBox');
    const resultTitle = document.getElementById('resultTitle');
    const resultText = document.getElementById('resultText');
    const resultClose = document.getElementById('resultClose');
    const serviceNameEl = document.getElementById('serviceName');
    const bankNameEl = document.getElementById('bankName');
    const accountNumberEl = document.getElementById('accountNumber');
    const accountHolderEl = document.getElementById('accountHolder');

    async function getOrder() {
      if (!orderId) return null;
      const res = await fetch('/api/orders');
      if (!res.ok) return null;
      const orders = await res.json();
      return orders.find(x => String(x.id) === String(orderId));
    }

    function normalizeNotePart(value) {
      return (value || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-zA-Z0-9\s]/g, '')
        .trim()
        .replace(/\s+/g, '_');
    }

    function buildPaymentNote(serviceSlug, customerName, customerPhone) {
      const noteBase = normalizeNotePart(serviceSlug) || normalizeNotePart(qs('label')) || 'tuchien';
      const namePart = normalizeNotePart(customerName);
      const phonePart = (customerPhone || '').replace(/[^0-9]/g, '');
      const parts = [noteBase];
      if (namePart) parts.push(namePart);
      if (phonePart) parts.push(phonePart);
      return parts.join('_');
    }

    function generateCaptcha() {
      const chars = 'ABCDEFGHJKMNPQRSTUVWXY3456789';
      let code = '';
      for (let i = 0; i < 4; i += 1) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      captchaCodeEl.textContent = code;
      return code;
    }

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function validatePhone(phone) {
      const digits = phone.replace(/[^0-9]/g, '');
      return digits.length >= 9 && digits.length <= 12;
    }

    function updateNotePreview(serviceSlug, serviceLabel) {
      paymentNoteEl.textContent = buildPaymentNote(
        serviceLabel || serviceSlug,
        customerNameInput.value,
        customerPhoneInput.value
      );
    }

    function validateCustomerForm(currentServiceSlug, currentServiceLabel) {
      const name = customerNameInput.value.trim();
      const phone = customerPhoneInput.value.trim();
      const email = customerEmailInput.value.trim();
      const captchaValue = captchaInput.value.trim().toUpperCase();
      const expectedCaptcha = captchaCodeEl.textContent.trim().toUpperCase();

      if (!name) {
        alert('Vui lòng nhập tên khách hàng.');
        return false;
      }
      if (!validatePhone(phone)) {
        alert('Vui lòng nhập số điện thoại hợp lệ (9-12 chữ số).');
        return false;
      }
      if (!validateEmail(email)) {
        alert('Vui lòng nhập địa chỉ email hợp lệ.');
        return false;
      }
      if (!captchaValue || captchaValue !== expectedCaptcha) {
        alert('Mã xác thực không đúng. Vui lòng thử lại.');
        generateCaptcha();
        captchaInput.value = '';
        return false;
      }
      updateNotePreview(currentServiceSlug, currentServiceLabel);
      return true;
    }

    async function handleCustomerSubmit(event) {
      event.preventDefault();
      const currentServiceSlug = qs('service');
      const currentServiceLabel = qs('label') || currentServiceSlug;
      if (!currentServiceSlug || !qs('price')) {
        alert('Không có thông tin dịch vụ hoặc giá. Vui lòng quay lại trang trước để tạo lại đơn.');
        return false;
      }
      if (!validateCustomerForm(currentServiceSlug, currentServiceLabel)) {
        return false;
      }
      if (!orderId) {
        await createOrderFromParams(
          customerNameInput.value.trim(),
          customerPhoneInput.value.trim(),
          customerEmailInput.value.trim()
        );
      } else {
        summary.textContent = 'Thông tin đã được xác nhận. Vui lòng hoàn tất chuyển khoản theo nội dung.';
      }
      return false;
    }

    function copyText(fieldId, button) {
      const item = document.getElementById(fieldId);
      if (!item) return;
      const text = item.textContent.trim();
      if (!text) return;
      const finish = () => {
        const original = button.textContent;
        button.textContent = 'Đã sao chép';
        setTimeout(() => button.textContent = original, 1500);
      };
      navigator.clipboard.writeText(text).then(finish).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          finish();
        } catch (err) {
          alert('Không thể sao chép tự động. Vui lòng sao chép thủ công.');
        }
        document.body.removeChild(textarea);
      });
    }

    async function loadOrder() {
      if (!orderId) return;
      const o = await getOrder();
      if (!o) {
        summary.textContent = 'Đơn không tìm thấy.';
        return;
      }
      if (!amountEl.textContent) {
        amountEl.textContent = Number(o.amount || 0).toLocaleString('vi-VN') + '₫';
      }
      summary.textContent = `Trạng thái: ${o.status}`;
      if (o.status === 'success' || o.status === 'paid') {
        showThankyou();
        return;
      }
      if (o.status === 'cancelled') {
        showFailure('Thanh toán thất bại', 'Đơn hàng đã bị hủy. Nếu bạn cần hỗ trợ, vui lòng liên hệ với chúng tôi.');
        return;
      }
      hideResult();
    }

    // Open QR in new tab
    if (btnOpenQr) btnOpenQr.addEventListener('click', () => {
      window.open('/qr-vietqr-sepay.png', '_blank', 'noopener');
    });

    function showResult(type, title, message) {
      resultBox.classList.remove('hidden');
      resultBox.classList.toggle('success', type === 'success');
      resultBox.classList.toggle('error', type === 'error');
      resultTitle.textContent = title;
      resultText.textContent = message;
    }

    function showThankyou() {
      document.getElementById('actions').classList.add('hidden');
      summary.textContent = 'Thanh toán thành công';
      showResult('success', 'Thanh toán thành công', 'Chúng tôi đã nhận được thanh toán của bạn. Cảm ơn bạn đã sử dụng dịch vụ Túc Hiên.');
    }

    function showFailure(title, message) {
      document.getElementById('actions').classList.remove('hidden');
      summary.textContent = 'Thanh toán chưa hoàn thành';
      showResult('error', title, message);
    }

    function hideResult() {
      resultBox.classList.add('hidden');
    }

    async function createOrderFromParams(customerName, customerPhone, customerEmail) {
      const serviceSlug = qs('service');
      const serviceLabel = qs('label') || serviceSlug;
      const price = Number(qs('price')) || 0;
      if (!serviceSlug || !price) {
        return;
      }
      summary.textContent = 'Đang tạo đơn thanh toán...';
      const res = await fetch('/api/create_checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: customerName,
          phone: customerPhone,
          email: customerEmail,
          service_name: serviceLabel,
          price
        })
      });
      if (!res.ok) {
        summary.textContent = 'Không thể tạo đơn thanh toán. Vui lòng thử lại sau.';
        return;
      }
      const data = await res.json();
      if (data.order_id) {
        const params = new URLSearchParams();
        params.set('order_id', data.order_id);
        params.set('service', serviceSlug);
        params.set('price', String(price));
        if (serviceLabel) params.set('label', serviceLabel);
        if (customerName) params.set('name', customerName);
        if (customerPhone) params.set('phone', customerPhone);
        if (customerEmail) params.set('email', customerEmail);
        history.replaceState(null, '', `/payment?${params.toString()}`);
        orderId = data.order_id;
        await loadOrder();
      }
    }

    btnPaid.addEventListener('click', async () => {
      btnPaid.disabled = true;
      const original = btnPaid.textContent;
      btnPaid.textContent = 'Đang kiểm tra...';
      const o = await getOrder();
      if (!o) {
        showFailure('Không tìm thấy đơn', 'Không thể tìm thấy đơn hàng. Vui lòng tải lại trang hoặc thử lại sau.');
      } else if (o.status === 'success' || o.status === 'paid') {
        showThankyou();
      } else {
        showFailure('Chưa nhận được chuyển khoản', 'Hệ thống vẫn chưa ghi nhận thanh toán. Nếu bạn đã chuyển khoản, vui lòng đợi vài phút và thử lại.');
      }
      btnPaid.disabled = false;
      btnPaid.textContent = original;
    });

    if (btnCopyNote) btnCopyNote.addEventListener('click', (event) => copyText('paymentNote', event.currentTarget));
    if (btnCopyAccount) btnCopyAccount.addEventListener('click', (event) => copyText('accountNumber', event.currentTarget));
    if (btnCopyHolder) btnCopyHolder.addEventListener('click', (event) => copyText('accountHolder', event.currentTarget));

    if (customerNameInput) customerNameInput.addEventListener('input', () => updateNotePreview(qs('service'), qs('label')));
    if (customerPhoneInput) customerPhoneInput.addEventListener('input', () => updateNotePreview(qs('service'), qs('label')));
    if (refreshCaptcha) refreshCaptcha.addEventListener('click', generateCaptcha);

    resultClose.addEventListener('click', () => {
      hideResult();
    });

    async function initializePage() {
      const serviceSlug = qs('service');
      const serviceLabel = qs('label') || serviceSlug || 'Dịch vụ Túc Hiên';
      const customerName = qs('name') || '';
      const customerPhone = qs('phone') || '';
      const customerEmail = qs('email') || '';
      const priceParam = Number(qs('price')) || 0;

      serviceNameEl.textContent = serviceLabel;
      amountEl.textContent = priceParam ? priceParam.toLocaleString('vi-VN') + '₫' : '';
      customerNameInput.value = customerName;
      customerPhoneInput.value = customerPhone;
      customerEmailInput.value = customerEmail;
      paymentNoteEl.textContent = buildPaymentNote(serviceSlug || serviceLabel, customerName, customerPhone);
      generateCaptcha();

      if (!serviceSlug && !orderId) {
        summary.textContent = 'Vui lòng quay lại trang trước để chọn dịch vụ và giá trước khi xác nhận thông tin.';
        return;
      }

      if (orderId) {
        await loadOrder();
      } else {
        summary.textContent = 'Nhập thông tin khách hàng và xác nhận để tạo đơn thanh toán.';
      }
    }

    // poll status
    setInterval(() => {
      if (orderId) loadOrder();
    }, 3000);
    initializePage();
  </script>
</body>
</html>
